esphome:
  name: esp32-wroom

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

logger:

api:

ota:
  platform: esphome
  password: "ota_password"

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

display:
  - platform: lcd_pcf8574
    id: lcd_display
    address: 0x3F
    dimensions: 20x4
    lambda: |-
      it.print(0, 0, "Hello from ESP!");
      it.print(0, 1, "Line 2");
      it.print(0, 2, "Line 3");
      it.print(0, 3, "Line 4");
